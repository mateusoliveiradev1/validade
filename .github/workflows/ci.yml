name: Baseline CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint and dependency boundaries
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Unit and package tests
        run: pnpm test

      - name: App smoke tests
        run: pnpm test:smoke

      - name: Build
        run: pnpm build

      - name: Security checks
        run: pnpm security

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block high and critical dependency findings
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
